# ============================================================================
# markdownlint Configuration
# ============================================================================
# Obsidian-compatible markdown linting rules.
# Used by markdownlint-cli2 for formatting via conform.nvim.
# See: https://github.com/DavidAnson/markdownlint/blob/main/doc/Rules.md
# ============================================================================

default: true

# === HEADINGS ===
MD001: true                              # Heading levels increment by one
MD003: { style: "atx" }                  # Use # style headings
MD018: true                              # Require space after hash in atx heading
MD019: true                              # No multiple spaces after hash
MD022: { lines_above: 1, lines_below: 1 } # Blank lines around headings
MD023: true                              # Headings start at line beginning
MD024: { siblings_only: true }           # Allow duplicate headings in sections
MD025: true                              # Single top-level heading
MD026: { punctuation: ".,;:!" }          # No trailing punctuation in headings

# === LISTS ===
MD004: { style: "dash" }                 # Use - for unordered lists
MD005: true                              # Consistent list indentation
MD007: { indent: 2 }                     # 2-space list indentation
MD029: { style: "one_or_ordered" }       # Ordered list style
MD030: { ul_single: 1, ol_single: 1, ul_multi: 1, ol_multi: 1 } # Space after marker
MD032: true                              # Blank lines around lists

# === WHITESPACE ===
MD009: { br_spaces: 2 }                  # Trailing spaces (allow 2 for breaks)
MD010: true                              # No hard tabs
MD012: { maximum: 1 }                    # Max 1 consecutive blank line
MD013: false                             # DISABLE line length (Obsidian notes)
MD031: true                              # Blank lines around code fences
MD047: true                              # File ends with newline

# === CODE & FORMATTING ===
MD014: true                              # Dollar signs in commands
MD038: true                              # Spaces inside code span
MD046: { style: "fenced" }               # Code block style
MD048: { style: "backtick" }             # Use backticks for code fences
MD049: { style: "asterisk" }             # Use *italic*
MD050: { style: "asterisk" }             # Use **bold**

# === LINKS ===
MD034: true                              # No bare URLs
MD039: true                              # No spaces in link text
MD042: true                              # No empty links

# === DISABLED FOR OBSIDIAN ===
MD033: false                             # Allow inline HTML
MD041: false                             # First line heading (YAML frontmatter)
